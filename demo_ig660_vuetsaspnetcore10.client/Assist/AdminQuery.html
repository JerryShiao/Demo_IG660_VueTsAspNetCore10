    <script>
        //選項的變換
        var url = window.location.toString();
        var str = "";
        document.getElementById('quiz1').innerHTML = '<option value="NON">不拘..</option><option value="08">中寮鄉</option><option value="13">仁愛鄉</option><option value="11">水里鄉</option><option value="06">名間鄉</option><option value="04">竹山鎮</option><option value="12">信義鄉</option><option value="01">南投市</option><option value="02">埔里鎮</option><option value="03">草屯鎮</option><option value="10">國姓鄉</option><option value="09">魚池鄉</option><option value="07">鹿谷鄉</option><option value="05">集集鎮</option>'
        var quiz3all = '';
        var quiz3note = [];
        var sellayer = parent.document.getElementById('SelectLayerSet');
        var sonlayer = document.getElementById('SelectLayerSon');
        sonlayer.innerHTML = "";
        var nodata = false;
        $.each(sellayer.children, function (key, val2) {
            var opt = document.createElement('option');
            opt.value = val2.value;
            opt.innerText = val2.innerText;
            sonlayer.appendChild(opt);
        });
        layui.use(['form', 'laydate'], function () {
            var form = layui.form
                , layer = layui.layer
                , laydate = layui.laydate;

            //日期
            laydate.render({
                elem: '#date'
            });
            laydate.render({
                elem: '#date1'
            });

            form.on('submit(sadmq)', function (data) {
                SentToMap2(JSON.stringify(data.field), 1, sonlayer.value);
                return false;
            });
            form.on('submit(sadmq2)', function (data) {
                SentToMap2(JSON.stringify(data.field), 2, sonlayer.value);
                return false;
            });
            form.on('select(quiz3Change)', function (data) {
                $('#URBANsp')[0].value = ''
                var child = $('#urbantypediv').find('input[type="checkbox"]');
                child.each(function (index, item) {
                    item.checked = false;
                });
                form.render('checkbox');
                SetColors("ownerdiv");
                SetColors("ownerdiv2");
                $.each(quiz3all, function (key, val) {
                    if (val.UseName === data.value) {
                        $('#AA10_min')[0].value = val.Area
                        $('#AA10_max')[0].value = ''
                        $('#URBANsp')[0].value = $('#URBANsp')[0].value + val.LandType + ','
                        quiz3note.push(val.Note);
                    }
                })
                $('#URBANsp')[0].value = $('#URBANsp')[0].value.toString().substring(0, $('#URBANsp')[0].value.toString().length - 1)
            });

            form.on('checkbox(allChoose)', function (data) {
                var child = $(data.elem).parents('div').find('div input[type="checkbox"]');
                child.each(function (index, item) {
                    item.checked = data.elem.checked;
                });
                form.render('checkbox');
                SetColors("ownerdiv");
                SetColors("ownerdiv2");
            });
            form.render();
            SetColors("ownerdiv");
            SetColors("ownerdiv2");

            $.ajax({
                url: 'https://eghouse.hccg.gov.tw/WebApiOpen/api/Rules',
                type: 'GET',
                dataType: 'json',
                success: function (data) {
                    quiz3all = data;
                }
            });
        });
        function SentToMap2(str, ty, lid) {
            parent.AdminLBQ(str, ty, lid);
        }
        function SetColors(divname) {
            $.each($('#' + divname + ' span'), function (key, obj) {
                if (obj.innerHTML === "本國人") {
                    obj.style.backgroundColor = '#ffcc00'
                }
                else if (obj.innerHTML === "外國人") {
                    obj.style.backgroundColor = '#ffcc00'
                }
                else if (obj.innerHTML === "國有") {
                    obj.style.backgroundColor = '#ff0000'
                }
                else if (obj.innerHTML === "直轄市有") {
                    obj.style.backgroundColor = '#ff6600'
                }
                else if (obj.innerHTML === "縣市有") {
                    obj.style.backgroundColor = '#ff6600'
                }
                else if (obj.innerHTML === "鄉鎮市有") {
                    obj.style.backgroundColor = '#ff6600'
                }
                else if (obj.innerHTML === "本國法人") {
                    obj.style.backgroundColor = '#33cc33'
                }
                else if (obj.innerHTML === "外國法人") {
                    obj.style.backgroundColor = '#33cc33'
                }
                else if (obj.innerHTML === "祭祀公業") {
                    obj.style.backgroundColor = '#0066ff'
                }
                else if (obj.innerHTML === "其他") {
                    obj.style.backgroundColor = '#0066ff'
                }
                else if (obj.innerHTML === "銀行法人") {
                    obj.style.backgroundColor = '#33cc33'
                }
                else if (obj.innerHTML === "大陸自然人") {
                    obj.style.backgroundColor = '#ffcc00'
                }
                else if (obj.innerHTML === "大陸法人") {
                    obj.style.backgroundColor = '#33cc33'
                }
            });
        }

    </script>
