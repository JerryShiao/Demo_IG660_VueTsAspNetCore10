<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSV to HTML Table</title>
    <meta name="author" content="Derek Eder">
    <meta content="Display any CSV file as a searchable, filterable, pretty HTML table" />
    <!-- Bootstrap core CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/dataTables.bootstrap.css" rel="stylesheet">
  </head>

  <body>
    <div class="container-fluid">
      <h2>查詢資料如下</h2>
      <div id='table-container'></div>
    </div>
    <footer class='footer'>
      <div class='container-fluid'>
        <hr />
        <p class='pull-right'>本功能提供市府公務團隊使用</p>
      </div>
    </footer>
    <script type="text/javascript" src="js/jquery.min.js"></script>
    <script type="text/javascript" src="js/bootstrap.min.js"></script>
    <script type="text/javascript" src="js/jquery.csv.min.js"></script>
    <script type="text/javascript" src="js/jquery.dataTables.min.js"></script>
    <script type="text/javascript" src="js/dataTables.bootstrap.js"></script>
    <script type="text/javascript" src="js/csv_to_html_table.js" charset="big5"></script>
    <script type="text/javascript">
      function format_link(link){
        if (link)
            return "<a onclick='SendMsg()'>" + link + "</a>";
        else
          return "";
      }
      CsvToHtmlTable.init({
          csv_path: 'data/File.csv',
          element: 'table-container',
          allow_download: true,
          csv_options: { separator: ',', delimiter: '"' },
          datatables_options: { "paging": false },
          //custom_formatting: [[4, format_link]]
      });
      var querytext =""
      function SendMsg(text) {
          try {
              if (querytext = "") {
                  $("#table-container-table tbody tr").click(function () {
                      var value2 = $(this).find('td:nth-child(2)').html();
                      var value3 = $(this).find('td:nth-child(3)').html();
                      var value4 = $(this).find('td:nth-child(4)').html();
                      var value5 = $(this).find('td:nth-child(5)').html();
                      parent.logbt3(value2 + value3 + value4 + value5);
                  });
              }
          }
          catch (err) {
              alert("您必須在主網站中才可執行。")
          }
      }
      $(window).load(function () {
          setTimeout(function () {
                  $("#table-container-table tbody tr").click(function () {
                      var value2 = $(this).find('td:nth-child(2)').html();
                      var value3 = $(this).find('td:nth-child(3)').html();
                      var value4 = $(this).find('td:nth-child(4)').html();
                      var value5 = $(this).find('td:nth-child(5)').html();
                      parent.logbt3(value2 + value3 + value4 + value5);
                  });
          }, 1234);
      });
    </script>
  </body>
</html>
