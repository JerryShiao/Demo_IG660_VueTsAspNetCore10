<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>租賃住宅服務業經營許可申請書</title>
    <link rel="icon" href="../../icons/png/logo_tn_icon.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <header>
        <nav></nav>
    </header>
    <div class="container">
        <h3>租賃住宅服務業經營許可申請書</h3>

        <!-- //受理機關 -->
        <div class="block" id="government">
            <div class="top">
                <p class="subtitle">受理機關</p>
            </div>
            <div class="main">
                <p>臺南市、縣市政府</p>
            </div>
        </div>

        <!-- //申請事由 -->
        <div class="block" id="reason">
            <div class="top">
                <p class="subtitle">申請事由</p>
            </div>

            <div class="main">
                <form id="form1">
                    <!-- 申請事由select -->
                    <label>
                        <p class="input-title">申請事由</p>
                        <select name="reason" id="selectreason">
                            <option value="申請許可">申請許可</option>
                            <option value="申請變更許可">申請變更許可</option>
                            <option value="重新申請許可(遷出原許可機關管轄區域者適用)">
                                重新申請許可(遷出原許可機關管轄區域者適用)
                            </option>
                        </select>
                    </label>

                    <!-- //變更項目為申請變更許可時展開 -->
                    <div class="change disable" id="change">
                        <div class="label-group">
                            <label class="multi-input">
                                <p class="input-title">原許可函</p>
                                <div class="input-group" id="confirm">
                                    <input type="text" name="year" maxlength="4" placeholder="年" />
                                    <input type="text" name="month" maxlength="2" placeholder="月" />
                                    <input type="text" name="day" maxlength="2" placeholder="日" />
                                    <input type="text" name="word" placeholder="字" />
                                    <input type="text" name="num" placeholder="號" />
                                </div>
                            </label>
                            <div class="radio-group">
                                <p class="input-title">變更事項</p>
                                <label>
                                    <input type="radio" name="changeItem" value="名稱" />
                                    <span>名稱</span>
                                </label>
                                <label>
                                    <input type="radio" name="changeItem" value="負責人" />
                                    <span>負責人</span>
                                </label>
                                <label>
                                    <input type="radio" name="changeItem" value="營業項目" />
                                    <span>營業項目</span>
                                </label>
                            </div>

                            <label>
                                <p class="input-title">變更前事項內容</p>
                                <input type="text" name="beforeChange" />
                            </label>

                            <label>
                                <p class="input-title">變更後事項內容</p>
                                <input type="text" name="afterChange" />
                            </label>
                        </div>
                    </div>
                    <!-- //變更項目為重新申請許可時展開 -->
                    <div class="new disable" id="new">
                        <div class="label-group">
                            <label>
                                <p class="input-title">原許可機關</p>
                                <input type="text" name="OriginalLicensingAuthority" />
                            </label>
                            <label class="multi-input">
                                <p class="input-title">原許可函</p>
                                <div class="input-group" id="confirm1">
                                    <input type="text" name="year1" maxlength="4" placeholder="年" />
                                    <input type="text" name="month1" maxlength="2" placeholder="月" />
                                    <input type="text" name="day1" maxlength="2" placeholder="日" />
                                    <input type="text" name="word1" placeholder="字" />
                                    <input type="text" name="num1" placeholder="號" />
                                </div>
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- //租賃住宅服務業 -->
        <div class="block" id="info">
            <div class="top">
                <p class="subtitle">租賃住宅服務業</p>
            </div>

            <div class="main">
                <form id="form2">
                    <div class="row">
                        <div class="col-left">
                            <label>
                                <p class="input-title">名稱</p>
                                <input type="text" name="residenceName" />
                            </label>
                            <div class="label-group">
                                <div class="radio-group">
                                    <p class="input-title">營業項目</p>
                                    <label>
                                        <input type="radio" name="comtype" id="comtype1" value="租賃住宅代管業" />
                                        <span>租賃住宅代管業</span>
                                    </label>
                                    <label>
                                        <input type="radio" name="comtype" id="comtype2" value="租賃住宅包租業" />
                                        <span>租賃住宅包租業</span>
                                    </label>
                                </div>
                            </div>

                            <label>
                                <p class="input-title">所在地</p>
                                <input type="text" name="residenceAddr" />
                            </label>
                        </div>
                        <div class="col-right">
                            <label>
                                <p class="input-title">連絡電話</p>
                                <input type="tel" name="residenceTel" />
                            </label>
                            <label>
                                <p class="input-title">傳真</p>
                                <input type="tel" name="residenceFax" />
                            </label>
                            <label>
                                <p class="input-title">電子郵件信箱</p>
                                <input type="email" name="residenceEmail" />
                            </label>
                        </div>
                    </div>

                    <div class="comregister" name="company_register">
                        <p class="input-title">是否已辦理公司登記</p>
                        <label class="morelabel">
                            <input type="radio" name="register" id="yes" value="1" />
                            <span>是</span>
                        </label>
                        <!-- 選擇是時展開 -->
                        <input type="number"
                               name="companynumbers"
                               id="companynumber"
                               placeholder="請填寫統一編號"
                               class="disable" />

                        <label class="morelabel">
                            <input type="radio" name="register" id="no" value="0" />
                            <span>否</span>
                        </label>
                    </div>
                </form>
            </div>
        </div>

        <!-- //租賃住宅服務業負責人名冊 -->
        <div class="block" id="person-list">
            <div class="top">
                <p class="subtitle">租賃住宅服務業負責人名冊</p>
            </div>

            <div class="main" id="tablegroup">
                <div class="table-group">
                    <div class="tb-col" name="tb1">
                        <div class="thead" name="person">職稱</div>
                        <input class="tb-data" type="text" name="A1" />
                    </div>
                    <div class="tb-col" name="tb2">
                        <div class="thead" name="person">姓名/法人資料</div>
                        <input class="tb-data" type="text" name="B1" />
                    </div>
                    <div class="tb-col" name="tb3">
                        <div class="thead" name="person">出生日期/法人設立日期</div>
                        <input class="tb-data" type="date" placeholder="年 / 月 / 日" name="C1" />
                    </div>
                    <div class="tb-col" name="tb4">
                        <div class="thead" name="person">身分證明文件號碼</div>
                        <input class="tb-data" type="text" name="D1" />
                    </div>
                    <!-- <div class="tb-col" name="tb5">
                                <div class="thead" name="person"></div>
                                <button class="tb-data deletebtn" name="E1">
                            </div> -->
                </div>
                <div class="btn-group">
                    <button class="function-btn" id="add">新增欄位</button>
                    <button class="deletebtn disable" id="del">刪除欄位</button>
                </div>
            </div>
        </div>

        <!-- //申請人資料 -->
        <div class="block" id="person-info01">
            <div class="top">
                <p class="subtitle">申請人資料(代表公司之負責人)</p>
            </div>

            <div class="main">
                <form id="form3">
                    <div class="row">
                        <div class="col-left">
                            <label>
                                <p class="input-title">姓名/法人名稱</p>
                                <input type="text" name="applicantName" />
                            </label>
                            <label>
                                <p class="input-title">戶籍/法人設立地址</p>
                                <input type="text" name="applicantAddr" />
                            </label>
                        </div>
                        <div class="col-right">
                            <label>
                                <p class="input-title">電子郵件信箱</p>
                                <input type="email" name="applicantEmail" />
                            </label>
                            <label>
                                <p class="input-title">通訊地址</p>
                                <input type="text" name="applicantAddr1" />
                            </label>
                        </div>
                    </div>
                    <div class="row contact">
                        <p>連絡電話</p>
                        <hr />
                    </div>
                    <div class="row-3">
                        <div class="row-3-left">
                            <label>
                                <p class="input-title">辦公室</p>
                                <input type="tel" name="applicantOfficeTel" />
                            </label>
                        </div>
                        <div class="row-3-mid">
                            <label>
                                <p class="input-title">住家</p>
                                <input type="tel" name="applicantHomeTel" />
                            </label>
                        </div>
                        <div class="row-3-right">
                            <label>
                                <p class="input-title">行動電話</p>
                                <input type="tel" name="applicantPhone" />
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- //代理人資料 -->
        <div class="block" id="person-info02">
            <div class="top">
                <p class="subtitle">代理人資料</p>
            </div>
            <div class="main">
                <form id="form4">
                    <div class="row">
                        <div class="col-left">
                            <label>
                                <p class="input-title">姓名/法人名稱</p>
                                <input type="text" name="agentName" />
                            </label>
                            <label>
                                <p class="input-title">通訊地址</p>
                                <input type="text" name="agentAddr" />
                            </label>
                        </div>
                        <div class="col-right">
                            <label>
                                <p class="input-title">電子郵件信箱</p>
                                <input type="email" name="agentEmail" />
                            </label>
                        </div>
                    </div>

                    <div class="row contact">
                        <p>連絡電話</p>
                        <hr />
                    </div>
                    <div class="row-3">
                        <div class="row-3-left">
                            <label>
                                <p class="input-title">辦公室</p>
                                <input type="tel" name="agentOfficeTel" />
                            </label>
                        </div>
                        <div class="row-3-mid">
                            <label>
                                <p class="input-title">住家</p>
                                <input type="tel" name="agentHomeTel" />
                            </label>
                        </div>
                        <div class="row-3-right">
                            <label>
                                <p class="input-title">行動電話</p>
                                <input type="tel" name="agentPhone" />
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- //附繳文件 -->
        <div class="block" id="document">
            <div class="top">
                <p class="subtitle">附繳文件</p>
            </div>
            <div class="main">
                <form id="form5">
                    <label>
                        <input type="checkbox" name="document" value="document_A" />租賃住宅服務業經營許可申請書<input type="number"
                                                                                                         id="document_A"
                                                                                                         min="0" />份(張)
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_B" />申請人身分證明文件影本<input type="number"
                                                                                                      id="document_B"
                                                                                                      min="0" />份(張)
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_C" />公司名稱及所經營事業登記預查證明文件影本<input type="number"
                                                                                                               id="document_C"
                                                                                                               min="0" />份(張)
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_D" />公司登記證明文件影本<input type="number"
                                                                                                     id="document_D"
                                                                                                     min="0" />份(張)
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_E" />代理人身分證明文件影本<input type="number"
                                                                                                      id="document_E"
                                                                                                      min="0" />份(張)
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_F" />原許可文件<input type="number"
                                                                                                id="document_F"
                                                                                                min="0" />份(張)
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_G" />其他<input type="text" id="document_G" />
                    </label>
                </form>
            </div>
        </div>

        <!-- 下載申請書按鈕 -->
        <button id="download">下載申請書</button>
    </div>

    <footer></footer>

    <!-- 基本動態頁面 -->
    <script src="js/index.js"></script>
    <!--Docx javascript 插件-->
    <script src="js/docxtemplater.js"></script>
    <script src="js/pizzip.js"></script>
    <script src="js/pizzip-utils.js"></script>
    <!--javascript檔案下載插件-->
    <script src="js/FileSaver.js"></script>
    <!--客製化javascript檔案-->
    <script src="js/docx_load_save.js"></script>
    <script src="js/docxReplace.js"></script>
</body>
</html>
