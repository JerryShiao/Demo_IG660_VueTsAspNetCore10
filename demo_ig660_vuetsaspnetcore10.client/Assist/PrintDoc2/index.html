<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地政士開業及變更登記申請書</title>
    <link rel="icon" href="../../icons/png/logo_tn_icon.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header>
        <nav></nav>
    </header>
    <div class="container">
        <h3>地政士開業及變更登記申請書</h3>
        <div class="block" id="government">
            <div class="top">
                <p class="subtitle">受理機關</p>
            </div>
            <div class="main">
                <p>臺南市、縣市政府</p>
            </div>
        </div>
        <div class="block">
            <div class="top">
                <p class="subtitle">申請登記事由</p>
            </div>
            <div class="main">
                <form id="form1">                    
                    <label>
                        <input type="radio" name="register" class="register" value="register_A">開業登記

                    </label>

                    <label>
                        <input type="radio" name="register" class="register" value="register_B">事務所自
                        <select name="city" id="city">
                            <option value="臺北">臺北市</option>
                            <option value="新北">新北市</option>
                            <option value="桃園">桃園市</option>
                            <option value="新竹">新竹縣</option>
                            <option value="苗栗">苗栗縣</option>
                            <option value="臺中">臺中市</option>
                            <option value="彰化">彰化縣</option>
                            <option value="南投">南投縣</option>
                            <option value="嘉義">嘉義縣</option>
                            <option value="臺南">臺南市</option>
                            <option value="高雄">高雄市</option>
                            <option value="屏東">屏東縣</option>
                            <option value="花蓮">花蓮縣</option>
                            <option value="宜蘭">宜蘭縣</option>
                        </select> 遷入

                    </label>

                    <label>
                        <input type="radio" name="register" class="register" value="register_C">開業執照換發
                        <div class="reasonblock">
                            <input type="text" class="reasons" name="reason1" placeholder="請填寫原因">
                        </div>
                    </label>

                    <label>
                        <input type="radio" name="register" class="register" value="register_D">開業執照補發
                        <div class="reasonblock">
                            <input type="text" class="reasons" name="reason1" placeholder="請填寫原因">
                        </div>
                    </label>

                    <label>
                        <input type="radio" name="register" class="register" value="register_E">開業執照註銷
                        <div class="reasonblock">
                            <input type="text" class="reasons" name="reason1" placeholder="請填寫原因">
                        </div>
                    </label>

                    <label>
                        <input type="radio" name="register" class="register" value="register_F">加註延長有效日期
                        <div class="reasonblock">
                            <input type="text" class="reasons" name="reason" placeholder="請填寫原因">
                        </div>
                    </label>

                    <label>
                        <input type="radio" name="register" class="register" value="register_G">共同執業人異動
                        <div class="reasonblock">
                            <input type="text" class="reasons" name="reason" placeholder="請填寫原因">
                        </div>
                    </label>

                    <label>
                        <input type="radio" name="register" class="register" value="register_H">事務所名稱變更
                        <div class="reasonblock">
                            <input type="text" class="reasons" name="reason" placeholder="請填寫原因">
                        </div>
                    </label>

                    <label>
                        <input type="radio" name="register" class="register" value="register_I">事務所地址變更
                        <div class="reasonblock">
                            <input type="text" class="reasons" name="reason" placeholder="請填寫原因">
                        </div>
                    </label>

                    <label>
                        <input type="radio" name="register" class="register" value="register_J">其他
                        <div class="reasonblock">
                            <input type="text" class="reasons" name="reason" placeholder="請填寫原因">
                        </div>
                    </label>
                </form>
            </div>
        </div>

        <div class="block">
            <div class="top">
                <p class="subtitle">附繳文件</p>
            </div>
            <div class="main">
                <form action="" id="form2">
                    <label>
                        <input type="checkbox" name="document" value="document_A">
                        <p>身分證明文件影本</p><input id="document_A" type="number" min="0">份
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_B">
                        <p>地政士或土地登記專業代理人證書及其影本</p><input id="document_B" type="number" min="0">份
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_C">
                        <p>最近一年內2吋半身照片(1式2張)</p>
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_D">
                        <p>內容變更證明文件</p><input id="document_D" type="number" min="0">份
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_E">
                        <p>原地政士(土地登記專業代理人)開業執照1份</p>
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_F">
                        <p>執照費 新台幣</p><input id="document_F" type="number" min="0">
                        <p>元現金或郵政匯票1張</p>
                    </label>
                    <label>
                        <input type="checkbox" name="document" value="document_G">
                        <p>最近四年內完成專業訓練30小時以上或與專業訓練相當之證明文件</p><input id="document_G" type="number" min="0">份
                    </label>
                </form>
            </div>
        </div>

        <div class="block" id="info">
            <div class="top">
                <p class="subtitle">開業事務所資料</p>
            </div>
            <div class="main">
                <form action="" class="row" id="form3">
                    <div class="col-left">
                        <label>
                            <p class="input-title">名稱</p>
                            <input type="text" name="office_name">
                        </label>
                        <label>
                            <p class="input-title">地址</p>
                            <input type="text" name="office_addr">
                        </label>
                        <label>
                            <p class="input-title">電話</p>
                            <input type="tel" name="office_tel">
                        </label>
                    </div>
                    <div class="col-right">
                        <label>
                            <p class="input-title">行動電話</p>
                            <input type="tel" name="office_phone">
                        </label>
                        <label>
                            <p class="input-title">傳真號碼</p>
                            <input type="text" name="office_fax">
                        </label>
                        <label>
                            <p class="input-title">電子郵件</p>
                            <input type="email" name="office_email">
                        </label>
                    </div>
                </form>
            </div>
        </div>
        <div class="block" id="person-info01">
            <div class="top">
                <p class="subtitle">申請人資料</p>
            </div>
            <div class="main">
                <form action="" id="form4">
                    <label class="label-group">
                        <p class="input-title">證書字號</p>
                        <input type="text" name="applicant_word">
                        <span>台內地登字</span>                            
                        <input type="text" name="applicant_num">
                        <span>號</span>
                    </label>
                    <div class="col">
                        <label class="gender-group">
                            <p class="input-title">性別</p>
                            <div class="gender-group-item">
                                <div>
                                    <input type="radio" name="gender" value="M">男
                                </div>
                                <div>
                                    <input type="radio" name="gender" value="F">女
                                </div>
                            </div>
                        </label>
                    </div>
                    <div class="row">
                        <div class="col-left">
                            <label class="label-group">
                                <p class="input-title">中文姓名</p>
                                <input type="text" name="applicant_name" placeholder="李大華">
                            </label>
                            <label class="label-group">
                                <p class="input-title">英文姓名</p>
                                <input type="text" name="applicant_name_us" placeholder="LI,TA HUA">
                            </label>
                            <label class="label-group">
                                <p class="input-title">身分證號碼</p>
                                <input type="text" name="applicant_id" placeholder="請輸入身分證共十碼" maxlength="10">
                            </label>
                            <label class="label-group">
                                <p class="input-title">出生日期</p>
                                <div class="row-3">
                                    <input type="number" name="applicant_year" placeholder="年(民國)" maxlength="3"
                                           min="0">
                                    <input type="number" name="applicant_month" placeholder="月" maxlength="2" min="0">
                                    <input type="number" name="applicant_day" placeholder="日" maxlength="2" min="0">
                                </div>
                            </label>
                        </div>
                        <div class="col-right">
                            <label class="label-group">
                                <p class="input-title">學歷</p>
                                <select name="education" id="education">
                                    <option value="請選擇">請選擇</option>
                                    <option value="國中">國中</option>
                                    <option value="高中">高中</option>
                                    <option value="大專">大專</option>
                                    <option value="大學">大學</option>
                                    <option value="碩士">碩士</option>
                                </select>
                            </label>
                            <label class="label-group">
                                <p class="input-title">經歷</p>
                                <input type="text" name="applicant_experience">
                            </label>
                            <label class="label-group">
                                <p class="input-title">戶籍地址</p>
                                <input type="text" name="applicant_addr">
                            </label>
                            <label class="label-group double">
                                <p class="input-title">通訊地址</p>
                                <div class="address">
                                    <div>
                                        <input type="checkbox" name="address">同戶籍地址
                                    </div>
                                    <input type="text" name="address_new" id="address_new">
                                </div>
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="block" id="person-info02">
            <div class="top">
                <p class="subtitle">共同執業人資料</p>
            </div>
            <div class="main">
                <form action="" id="form5">
                    <label class="label-group">
                        <p class="input-title">證書字號</p>
                        <input type="text" name="applicant_word">
                        <span>台內地登字</span>
                        <!--<div style="width:20px"></div>
                        <span>第</span>-->
                        <input type="text" name="applicant_num">
                        <span>號</span>
                    </label>
                    <div class="col">
                        <label class="gender-group">
                            <p class="input-title">性別</p>
                            <div class="gender-group-item">
                                <div>
                                    <input type="radio" name="gender" value="M">男
                                </div>
                                <div>
                                    <input type="radio" name="gender" value="F">女
                                </div>
                            </div>
                        </label>
                    </div>
                    <div class="row">
                        <div class="col-left">
                            <label class="label-group">
                                <p class="input-title">中文姓名</p>
                                <input type="text" name="applicant_name" placeholder="李大華">
                            </label>
                            <label class="label-group">
                                <p class="input-title">英文姓名</p>
                                <input type="text" name="applicant_name_us" placeholder="LI,TA HUA">
                            </label>
                            <label class="label-group">
                                <p class="input-title">身分證號碼</p>
                                <input type="text" name="applicant_id" placeholder="請輸入身分證共十碼" maxlength="10">
                            </label>
                            <label class="label-group">
                                <p class="input-title">出生日期</p>
                                <div class="row-3">
                                    <input type="number" name="applicant_year" placeholder="年(民國)" maxlength="3"
                                           min="0">
                                    <input type="number" name="applicant_month" placeholder="月" maxlength="2" min="0">
                                    <input type="number" name="applicant_day" placeholder="日" maxlength="2" min="0">
                                </div>
                            </label>
                        </div>
                        <div class="col-right">
                            <label class="label-group">
                                <p class="input-title">學歷</p>
                                <select name="education" id="education">
                                    <option value="請選擇">請選擇</option>
                                    <option value="國中">國中</option>
                                    <option value="高中">高中</option>
                                    <option value="大專">大專</option>
                                    <option value="大學">大學</option>
                                    <option value="碩士">碩士</option>
                                </select>
                            </label>
                            <label class="label-group">
                                <p class="input-title">經歷</p>
                                <input type="text" name="applicant_experience">
                            </label>
                            <label class="label-group">
                                <p class="input-title">戶籍地址</p>
                                <input type="text" name="applicant_addr">
                            </label>
                            <label class="label-group double">
                                <p class="input-title">通訊地址</p>
                                <div class="address">
                                    <div>
                                        <input type="checkbox" name="address">同戶籍地址
                                    </div>
                                    <input type="text" name="address_new" id="address_new1">
                                </div>
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <button id="download">下載申請書</button>
    </div>
    <footer></footer>

    
    <script src="js/index.js"></script>
    <!--Docx javascript 插件-->
    <script src="js/docxtemplater.js"></script>
    <script src="js/pizzip.js"></script>
    <script src="js/pizzip-utils.js"></script>
    <!--javascript檔案下載插件-->
    <script src="js/FileSaver.js"></script>
    <!--客製化javascript檔案-->
    <script src="js/docx_load_save.js"></script>
    <script src="js/docxReplace.js"></script>
</body>



</html>
