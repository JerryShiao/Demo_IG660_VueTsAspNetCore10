<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不動產經紀業經營許可申請書</title>
    <!--↓logo更換↓-->
    <link rel="icon" href="../../icons/png/logo_tn_icon.png" type="image/x-icon" />
    <!--↑logo更換↑-->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav></nav>
    </header>
    <div class="container">
        <h3>不動產經紀業經營許可申請書</h3>
        <div class="block" id="government">
            <div class="top">
                <p class="subtitle">受理機關</p>
            </div>
            <div class="main">
                <p>臺南市政府地政處</p>
            </div>
        </div>
        <!-- 申請事由 -->
        <div class="block" id="reason">
            <div class="top">
                <p class="subtitle">申請事由</p>
            </div>

            <div class="main">
                <form id="form01">
                    <!-- 申請事由select選單 -->
                    <div class="row">
                        <label>
                            <p class="input-title">申請事由</p>
                            <select name="reason" id="selectreason">
                                <option value="申請許可">申請許可</option>
                                <option value="申請補發許可">申請補發許可</option>
                                <option value="申請換發許可">申請換發許可</option>
                                <option value="申請變更原許可事項">申請變更原許可事項</option>
                                <option value="申請註銷許可">申請註銷許可</option>
                            </select>
                        </label>
                        <label class="">
                            <p class="input-title">原因</p>
                            <select name="detailreason" id="detailreason">
                                <option value="新設公司">新設公司</option>
                                <option value="新設商號">新設商號</option>
                            </select>
                        </label>
                    </div>

                    <!-- 變更項目為"申請補發許可"時展開 -->
                    <div id="reNewItem" class="disable">
                        <div class="line"></div>
                        <div class="row">
                            <div class="col-left">
                                <label class="label-group">
                                    <p class="input-title">原因</p>
                                    <input type="text" name="申請補發許可原因">
                                </label>
                            </div>
                            <div class="col-right">
                                <label class="label-group">
                                    <p class="input-title">原許可字號</p>
                                    <div class="row-3">
                                        <input type="text" name="申請補發許可字">
                                        <span>字</span>
                                        <input type="text" name="申請補發許可號">
                                        <span>號</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                    <!-- //變更項目為"申請換發許可"時展開 -->
                    <div id="changeNewItem" class="disable">
                        <div class="line"></div>
                        <div class="row">
                            <div class="col-left">
                                <label class="label-group">
                                    <p class="input-title">原因</p>
                                    <input type="text" name="申請換發許可原因">
                                </label>
                            </div>
                            <div class="col-right">
                                <label class="label-group">
                                    <p class="input-title">原許可字號</p>
                                    <div class="row-3">
                                        <input type="text" name="申請換發許可字">
                                        <span>字</span>
                                        <input type="text" name="申請換發許可號">
                                        <span>號</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                    <!-- //變更項目為"申請註銷許可" -->
                    <div id="cancelItem" class="disable">
                        <div class="line"></div>
                        <div class="row">
                            <div class="col-left">
                                <label class="label-group">
                                    <p class="input-title">原因</p>
                                    <input type="text" name="申請註銷許可原因">
                                </label>
                            </div>
                            <div class="col-right">
                                <label class="label-group">
                                    <p class="input-title">原許可字號</p>
                                    <div class="row-3">
                                        <input type="text" name="申請註銷許可字">
                                        <span>字</span>
                                        <input type="text" name="申請註銷許可號">
                                        <span>號</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                    <!-- //變更項目為"申請變更原許可事項"時展開 -->
                    <div class="changeItem disable" id="changeItem">
                        <div class="line"></div>
                        <div class="label-group" id="adddiv01">
                            <div class="row">
                                <div class="col-left">
                                    <label class="label-group">
                                        <p class="input-title">變更事項</p>
                                        <select name="變更事項" id="itemChangeReason">
                                            <option value="請選擇變更事項">請選擇變更事項</option>
                                            <option value="名稱">名稱</option>
                                            <option value="所在地">所在地</option>
                                            <option value="組織型態">組織型態</option>
                                            <option value="營業項目">營業項目</option>
                                            <option value="負責人">負責人</option>
                                        </select>
                                    </label>
                                    <label class="label-group">
                                        <p class="input-title">原許可字號</p>
                                        <div class="row-3">
                                            <input type="text" name="申請變更原許可事項字">
                                            <span>字</span>
                                            <input type="text" name="申請變更原許可事項號">
                                            <span>號</span>
                                        </div>
                                    </label>
                                </div>
                                <div class="col-right">
                                    <label class="label-group">
                                        <p class="input-title">變更前事項內容</p>
                                        <input type="text" name="變更前事項內容">
                                    </label>
                                    <label class="label-group">
                                        <p class="input-title">變更後事項內容</p>
                                        <input type="text"name="變更後事項內容">
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- 經紀業資料 -->
        <div class="block" id="company">
            <div class="top">
                <p class="subtitle">經紀業</p>
            </div>
            <div class="main">
                <form id="form02">
                    <div class="row">
                        <div class="col-left">
                            <label class="label-group">
                                <p class="input-title">名稱</p>
                                <input type="text" name="經紀業名稱">
                            </label>
                            <label class="label-group">
                                <p class="input-title">所在地</p>
                                <input type="text" name="經紀業所在地">
                            </label>
                        </div>
                        <div class="col-right">
                            <label class="label-group">
                                <p class="input-title">電話</p>
                                <input type="number" name="經紀業電話">
                            </label>
                            <label class="label-group">
                                <p class="input-title">傳真</p>
                                <input type="tel" name="經紀業傳真">
                            </label>
                            <label class="label-group">
                                <p class="input-title">電子郵件</p>
                                <input type="email" name="經紀業電子郵件信箱">
                            </label>
                        </div>
                    </div>
                    <!-- 各項單選項目 -->
                    <div class="line"></div>
                    <div class="row">
                        <div class="col-left">
                            <div class="radio-group">
                                <p class="input-title">組織型態</p>
                                <div>
                                    <label>
                                        <input type="radio" name="type" value="公司" checked>
                                        <p>公司</p>
                                    </label>
                                    <label>
                                        <input type="radio" name="type" value="商號">
                                        <p>商號</p>
                                    </label>
                                </div>
                            </div>
                            <div class="radio-group">
                                <p class="input-title">是否已辦理公司登記</p>
                                <div>
                                    <label>
                                        <input type="radio" name="companyRegister" value="是">
                                        <p>是</p>
                                    </label>
                                    <label>
                                        <input type="radio" name="companyRegister" value="否">
                                        <p>否</p>
                                    </label>
                                </div>
                            </div>
                            <div class="radio-group">
                                <p class="input-title">是否已辦理商業登記</p>
                                <div>
                                    <label>
                                        <input type="radio" name="businessRegister" value="是">
                                        <p>是</p>
                                    </label>
                                    <label>
                                        <input type="radio" name="businessRegister" value="否">
                                        <p>否</p>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-right">
                            <div class="radio-group">
                                <p class="input-title">經營型態</p>
                                <div>
                                    <label>
                                        <input type="radio" name="style" value="直營體系">
                                        <p>直營體系</p>
                                    </label>
                                    <label>
                                        <input type="radio" name="style" value="加盟體系">
                                        <p>加盟體系</p>
                                    </label>
                                </div>
                            </div>
                            <div class="radio-group">
                                <p class="input-title">營業項目</p>
                                <div>
                                    <label>
                                        <input type="radio" name="item" value="不動產仲介經紀業">
                                        <p>不動產仲介經紀業</p>
                                    </label>
                                    <label>
                                        <input type="radio" name="item" value="不動產代銷經紀業">
                                        <p>不動產代銷經紀業</p>
                                    </label>
                                </div>
                            </div>
                            <div class="radio-group">
                                <p class="input-title">是否經營國外不動產仲介或代銷業務</p>
                                <div>
                                    <label>
                                        <input type="radio" name="foreign" value="是">
                                        <p>是</p>
                                    </label>
                                    <label>
                                        <input type="radio" name="foreign" value="否">
                                        <p>否</p>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- 經紀業負責人、董事、監察人、經理人名冊DONE -->
        <div class="block" id="person-list">
            <div class="top">
                <p class="subtitle">經紀業負責人、董事、監察人、經理人名冊</p>
            </div>
            <div class="main" id="tablegroup">
                <form id="form03">
                    <div class="table-group" name="tableGroup">
                        <div class="tb-col" name="tb1">
                            <div class="thead" name="person">職稱</div>
                            <input class="tb-data" type="text" name='A1'>
                        </div>
                        <div class="tb-col" name="tb2">
                            <div class="thead" name="person">姓名</div>
                            <input class="tb-data" type="text" name="B1">
                        </div>
                        <div class="tb-col" name="tb3">
                            <div class="thead" name="person">出生日期</div>
                            <input class="tb-data" type="date" placeholder="年 / 月 / 日" name="C1">

                        </div>
                        <div class="tb-col" name="tb4">
                            <div class="thead" name="person">國民身分證統一編號/護照號碼</div>
                            <input class="tb-data" type="text" name="D1">
                        </div>
                    </div>
                </form>
                <div class="btn-group">
                    <button class="function-btn" id="add">新增欄位</button>
                    <button class="deletebtn disable" id="del">刪除欄位</button>
                </div>
            </div>
        </div>

        <!-- 負責人資料DONE -->
        <div class="block" id="person-info01">
            <div class="top">
                <p class="subtitle">負責人資料</p>
            </div>
            <div class="main">
                <form id="form04">

                    <div class="row">
                        <div class="col-left">
                            <label class="label-group">
                                <p class="input-title">姓名</p>
                                <input type="text" name="Name" placeholder="李大華">
                            </label>
                            <label class="label-group">
                                <p class="input-title">連絡電話</p>
                                <div class="row-3">
                                    <input type="tel" maxlength="10" name="telOffice" placeholder="辦公室">
                                    <input type="tel" maxlength="10" name="telHome" placeholder="住家">
                                    <input type="tel" maxlength="10" name="phoneNumber" placeholder="手機">
                                </div>
                            </label>

                        </div>
                        <div class="col-right">
                            <label class="label-group">
                                <p class="input-title">電子郵件</p>
                                <input type="email" name="Email">
                            </label>
                            <div id="address">
                                <label class="label-group">
                                    <p class="input-title">戶籍地址</p>
                                    <input type="text" name="applicant_addr">
                                </label>
                                <label class="label-group double">
                                    <p class="input-title">通訊地址</p>
                                    <div class="address">
                                        <div>
                                            <input type="radio" name="address">同戶籍地址
                                        </div>
                                        <input type="text" name="applicant_addr1">
                                    </div>
                                </label>

                            </div>

                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- 代理人資料DONE -->
        <div class="block" id="person-info02">
            <div class="top">
                <p class="subtitle">代理人資料</p>
            </div>
            <div class="main">
                <form id="form05">
                    <div class="row">
                        <div class="col-left">
                            <label class="label-group">
                                <p class="input-title">姓名</p>
                                <input type="text" name="Name2" placeholder="李大華">
                            </label>
                            <label class="label-group">
                                <p class="input-title">連絡電話</p>
                                <div class="row-3">
                                    <input type="tel" maxlength="10" name="telOffice2" placeholder="辦公室">
                                    <input type="tel" maxlength="10" name="telHome2" placeholder="住家">
                                    <input type="tel" maxlength="10" name="phoneNumber2" placeholder="手機">
                                </div>
                            </label>
                        </div>
                        <div class="col-right">
                            <label class="label-group">
                                <p class="input-title">電子郵件</p>
                                <input type="email" name="Email2">
                            </label>
                            <label class="label-group">
                                <p class="input-title">通訊地址</p>
                                <input type="text" name="applicant_addr2">
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- 附繳文件 -->
        <div class="block" id="document">
            <div class="top">
                <p class="subtitle">附繳文件</p>
            </div>
            <div class="main">
                <form id="form06">
                  
                </form>
            </div>
        </div>
        <button id="download">下載申請書</button>
    </div>
    <footer></footer>

    <!-- 基本動態js -->
    <script src="js/index.js"></script>
    <!--Docx javascript 插件-->
    <script src="js/docxtemplater.js"></script>
    <script src="js/pizzip.js"></script>
    <script src="js/pizzip-utils.js"></script>
    <!--javascript檔案下載插件-->
    <script src="js/FileSaver.js"></script>
    <!--客製化javascript檔案-->
    <script src="js/docx_load_save.js"></script>
    <script src="js/docxReplace.js"></script>

</body>


</html>
