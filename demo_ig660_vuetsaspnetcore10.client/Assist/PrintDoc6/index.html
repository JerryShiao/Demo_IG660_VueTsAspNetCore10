<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地政士登記助理員備查申請書</title>
    <!--↓logo更換↓-->
    <link rel="icon" href="../../icons/png/logo_tn_icon.png" type="image/x-icon" />
    <!--↑logo更換↑-->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav></nav>
    </header>
    <div class="container">
        <h3>地政士登記助理員備查申請書</h3>
        <!-- 受理機關 -->
        <form id="form05">
            <div class="block" id="government">
                <div class="top">
                    <p class="subtitle">受理機關</p>
                </div>
                <div class="main">
                    <div class="gov">
                        <input type="text" name="受理機關">
                        <p class="input-title">市、縣（市）政府</p>
                        <input type="text" name="受理公會">
                        <p class="input-title">地政士公會</p>
                    </div>
                </div>
            </div>
        </form>

        <!-- 地政士(申請人)資料 -->
        <div class="block" id="main-person">
            <div class="top">
                <p class="subtitle">地政士(申請人)資料</p>
            </div>
            <div class="main">
                <form id="form01">
                    <div class="row">
                        <div class="col-left">
                            <label class="label-group">
                                <p class="input-title">姓名</p>
                                <input type="text" name="地政士姓名">
                            </label>
                            <label class="label-group">
                                <p class="input-title">
                                    國民身分證
                                    統一編號
                                </p>
                                <input type="text" maxlength="10" name="國民身分證統一編號">
                            </label>
                            <label class="label-group">
                                <p class="input-title">開業執照字號</p>
                                <input type="text" name="地政士開業執照字號">
                            </label>

                        </div>
                        <div class="col-right">

                            <label class="label-group">
                                <p class="input-title">電話</p>
                                <input type="tel" name="地政士電話">
                            </label>
                            <label class="label-group">
                                <p class="input-title">通訊地址</p>
                                <input type="text" name="地政士通訊地址">
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- 地政士登記助理員資料01 -->
        <div class="block" id="person-info01" name="person-info">
            <div class="top">
                <p class="subtitle">地政士登記助理員01</p>
            </div>
            <div class="main">
                <form id="form02">
                    <div class="row">
                        <div class="col-left">
                            <label class="label-group">
                                <p class="input-title">姓名</p>
                                <input type="text" name="姓名">
                            </label>
                            <div class="radio-group">
                                <p class="input-title">性別</p>
                                <label>
                                    <input type="radio" name="gender" value="男">
                                    <p>男</p>
                                </label>
                                <label>
                                    <input type="radio" name="gender" value="女">
                                    <p>女</p>
                                </label>
                            </div>
                            <label class="label-group">
                                <p class="input-title">出生日期</p>
                                <input type="date" name="出生日期">
                            </label>
                            <label class="label-group">
                                <p class="input-title">國民身分證統一編號</p>
                                <input type="text" maxlength="10" name="國民身分證統一編號">
                            </label>
                            <label class="label-group">
                                <p class="input-title">地政士證書字號</p>
                                <div class="row-3">
                                    <input type="text" name="台內地登字">
                                    <span>台內地登字</span>
                                    <input type="text" name="號">
                                    <span>號</span>
                                </div>
                            </label>
                        </div>
                        <div class="col-right">
                            <label class="label-group">
                                <p class="input-title">學歷</p>
                                <input type="text" name="學歷">
                            </label>
                            <label class="label-group">
                                <p class="input-title">經歷</p>
                                <input type="text" name="經歷">
                            </label>
                            <label class="label-group">
                                <p class="input-title">住址</p>
                                <input type="text" name="住址">
                            </label>
                            <label class="label-group">
                                <p class="input-title">申請事由</p>
                                <select name="申請事由" id="">
                                    <option value="僱傭">僱傭</option>
                                    <option value="終止僱傭">終止僱傭</option>
                                    <option value="姓名變更">姓名變更</option>
                                    <option value="出生日期變更">出生日期變更</option>
                                    <option value="國民身分證統一編號變更">國民身分證統一編號變更</option>
                                    <option value="其他">其他</option>
                                </select>
                                <input type="text" name="otherReason" placeholder="請填寫其他事由" class="disable">
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- 地政士登記助理員資料02 -->
        <div class="block" id="person-info02" name="person-info">
            <div class="top">
                <p class="subtitle">地政士登記助理員02</p>
            </div>
            <div class="main">
                <form id="form03">
                    <div class="row">
                        <div class="col-left">
                            <label class="label-group">
                                <p class="input-title">姓名</p>
                                <input type="text" name="姓名">
                            </label>
                            <div class="radio-group">
                                <p class="input-title">性別</p>
                                <label>
                                    <input type="radio" name="gender" value="男">
                                    <p>男</p>
                                </label>
                                <label>
                                    <input type="radio" name="gender" value="女">
                                    <p>女</p>
                                </label>
                            </div>
                            <label class="label-group">
                                <p class="input-title">出生日期</p>
                                <input type="date" name="出生日期">
                            </label>
                            <label class="label-group">
                                <p class="input-title">國民身分證統一編號</p>
                                <input type="text" maxlength="10" name="國民身分證統一編號">
                            </label>
                            <label class="label-group">
                                <p class="input-title">地政士證書字號</p>
                                <div class="row-3">
                                    <input type="text" name="台內地登字">
                                    <span>台內地登字</span>
                                    <input type="text" name="號">
                                    <span>號</span>
                                </div>
                            </label>
                        </div>
                        <div class="col-right">
                            <label class="label-group">
                                <p class="input-title">學歷</p>
                                <input type="text" name="學歷">
                            </label>
                            <label class="label-group">
                                <p class="input-title">經歷</p>
                                <input type="text" name="經歷">
                            </label>
                            <label class="label-group">
                                <p class="input-title">住址</p>
                                <input type="text" name="住址">
                            </label>
                            <label class="label-group">
                                <p class="input-title">申請事由</p>
                                <select name="申請事由" id="">
                                    <option value="僱傭">僱傭</option>
                                    <option value="終止僱傭">終止僱傭</option>
                                    <option value="姓名變更">姓名變更</option>
                                    <option value="出生日期變更">出生日期變更</option>
                                    <option value="國民身分證統一編號變更">國民身分證統一編號變更</option>
                                    <option value="其他">其他</option>
                                </select>
                                <input type="text" name="otherReason" placeholder="請填寫其他事由" class="disable">
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- 附繳文件 -->
        <div class="block" id="document">
            <div class="top">
                <p class="subtitle">附繳文件</p>
            </div>
            <div class="main">
                <form id="form04">
                    <div>
                        <label>
                            <input type="checkbox" name="document" value="document1">身分證明文件影本<input type="number" name="document1_content">份(申請終止僱傭者，免附繳)
                        </label>
                    </div>
                    <div>
                        <label>
                            <input type="checkbox" name="document" value="document2">地政士證書或土地登記專業代理人證書影本<input type="number" name="document2_content">份
                        </label>
                    </div>
                    <div id="extra">
                        <div>
                            <label>
                                <input type="checkbox" name="document" value="document3">專科以上學校地政相關系科畢業證書影本<input type="number" name="document3_content">份
                            </label>
                        </div>
                        <div>
                            <label>
                                <input type="checkbox" name="document" value="document4">高中或高職以上學校畢業證書影本<input type="number" name="document4_content">份
                            </label>
                        </div>
                        <div>
                            <label>
                                <input type="checkbox" name="document" value="document5">地政士事務所服務二年以上證明文件<input type="number" name="document5_content">份
                            </label>
                        </div>
                        <div>
                            <label>
                                <input type="checkbox" name="document" value="document6">其他<input type="text" name="document6_content">
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <button id="download">下載申請書</button>
    </div>
    <footer></footer>

    <!-- 基本動態js -->
    <script src="js/index.js"></script>
    <!--Docx javascript 插件-->
    <script src="js/docxtemplater.js"></script>
    <script src="js/pizzip.js"></script>
    <script src="js/pizzip-utils.js"></script>
    <!--javascript檔案下載插件-->
    <script src="js/FileSaver.js"></script>
    <!--客製化javascript檔案-->
    <script src="js/docx_load_save.js"></script>
    <script src="js/docxReplace.js"></script>

</body>


</html>
