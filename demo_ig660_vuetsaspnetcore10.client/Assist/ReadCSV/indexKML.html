<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading csv file using javascript</title>
    <meta name="description" content="Reading csv file using javascript" />
    <meta name="author" content="Arkaprava Majumder" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="js/togeojson.js" charset="utf-8"></script>
    <script src="js/papaparse.js" charset="utf-8"></script>
    <script src="js/reading-csv-file-using-javascript.js" charset="utf-8"></script>
    <script>
        function SentToMap3(results) {
            var data = "";
            if (results.data.length > 1) {
                $.each(results.data, function (key, val) {
                    val = val.toString().replaceAll('&lt;', '<');
                    val = val.toString().replaceAll('&gt;', '>');
                    data += val.toString().replace(/\r\n|\n/g, "");
                });
            }
            else {
                data = results.data;
                data = data.toString().replaceAll('&lt;', '<');
                data = data.toString().replaceAll('&gt;', '>');
            }
            var GJ = toGeoJSON['kml']((new DOMParser()).parseFromString(data, 'text/xml'));
            parent.SentToMap3(GJ, $('#files')[0].files["0"].name);
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>請讀取KML檔案</h2>
        </div>
        <div class="main">
            KML請使用正確規範格式:<a href="KML_Samples.kml" target="_blank" rel="nofollow"> 範例檔</a>
            <div class="form-inline">
                <div class="form-group">
                    <label for="files"></label><input type="file" id="files" class="form-control" style="padding:6px; height:unset" required accept=".kml" onchange="checkfile(this);" />
                </div>
                <div class="form-group">
                    <button type="submit" id="submit" class="btn btn-primary">預覽資料</button>
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript" language="javascript">
        function checkfile(sender) {
            var validExts = new Array(".kml");
            var fileExt = sender.value;
            fileExt = fileExt.substring(fileExt.lastIndexOf('.'));
            if (validExts.indexOf(fileExt) < 0) {
                alert("檔案類型錯誤，可接受的副檔名有：" + validExts.toString());
                sender.value = null;
                return false;
            }
            else return true;
        }
    </script>
</body>
</html>
