<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>視野模擬</title>
    <style>
        html,
        body,
        #mapDiv,
        #SceneViewshed_Div {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #previewContainer {
            pointer-events: none;
            width: 33%;
            height: 33%;
            margin: 0;
            position: absolute;
            bottom: 8px;
            right: 8px;
            border: 1px solid dimgrey;
        }
    </style>
    <link rel="stylesheet" href="https://js.arcgis.com/4.33/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.33/"></script>
</head>
<body>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
        var FirstPreview = false, PreviewCount=0;
        var SView
        var x, y, z, fDis, tilt, heading, hFOV, vFOV;
        $(document).ready(function () {
            var url = window.location.toString();
            if (url.indexOf("?") != -1) {
                var ary = url.split("?")[1].split("&");
                $.each(ary, function (key, val) {
                    if (val.split('=')[0] == 'x') { x = val.split('=')[1] }
                    else if (val.split('=')[0] == 'y') { y = val.split('=')[1] }
                    else if (val.split('=')[0] == 'z') { z = val.split('=')[1] }
                    else if (val.split('=')[0] == 'fDis') { fDis = val.split('=')[1] }
                    else if (val.split('=')[0] == 'tilt') { tilt = val.split('=')[1] }
                    else if (val.split('=')[0] == 'heading') { heading = val.split('=')[1] }
                    else if (val.split('=')[0] == 'hFOV') { hFOV = val.split('=')[1] }
                    else if (val.split('=')[0] == 'vFOV') { vFOV = val.split('=')[1] }
                })
                Viewshed_();
            }
            else { alert('發生錯誤') }
        })
        function Viewshed_() {
            require(["esri/Map", "esri/views/SceneView", "esri/layers/WebTileLayer", "esri/layers/SceneLayer", "esri/layers/IntegratedMeshLayer", "esri/analysis/ViewshedAnalysis", "esri/analysis/Viewshed", "esri/core/promiseUtils", "esri/core/reactiveUtils", "esri/Camera"], function (Map, SceneView, WebTileLayer, SceneLayer, IntegratedMeshLayer, ViewshedAnalysis, Viewshed, promiseUtils, reactiveUtils, Camera) {
                var PHOTO2_WTLayer = new WebTileLayer({
                    urlTemplate: "https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/GoogleMapsCompatible/{level}/{row}/{col}", id: "layer_PHOTO2", title: "測繪中心影像", visible: true
                });

                var sceneLayer = new SceneLayer({
                    url: "https://i3s.nlsc.gov.tw/building/i3s/SceneServer/layers/11",
                    id: "NLSC3dLayer",
                    title: "三維建物模型",
                    outFields: [],
                    popupEnabled: false,
                    elevationInfo: { mode: "absolute-height", offset: 0.1, unit: "meters" },
                    opacity: 0.8,
                    minScale: 5000,
                    visible: true
                });
                let MainMap = new Map({
                    center: { type: "point", x: x, y: y, spatialReference: { wkid: 4326 } },
                    scale: 1250,
                    layers: [PHOTO2_WTLayer, sceneLayer]
                });
                SView = new SceneView({
                    container: "SceneViewshed_Div",
                    map: MainMap, scale: MainMap.scale, center: MainMap.center,
                    //viewingMode: "local",
                    //clippingArea: extent,
                    constraints: { snapToZoom: true, altitude: { min: 50, max: 5000000 } },
                });
                SView.ui.components = [];
                SView.ui.padding = { top: 64, left: 4, right: 4, bottom: 32 };

                SView.when(async () => {
                    SView.goTo({
                        tilt: 25,
                        fov: 55,
                        position: [x, y, z + 200],
                    });

                    const viewshedAnalysis = new ViewshedAnalysis();
                    SView.analyses.add(viewshedAnalysis);
                    let Tr = WGStoW3857(x, y);

                    let programaticViewshed = new Viewshed({
                        observer: { spatialReference: SView.spatialReference, x: Tr[0], y: Tr[1], z: z },
                        farDistance: fDis, // In meters
                        tilt: tilt, // 傾斜 0~90 預設值90
                        heading: heading,
                        horizontalFieldOfView: hFOV,//hFOV 水平視野 0~360 預設值45
                        verticalFieldOfView: vFOV//vFOV 垂直視野 0~180 預設值45
                    });
                    viewshedAnalysis.viewsheds.add(programaticViewshed);

                    var analysisView = await SView.whenAnalysisView(viewshedAnalysis);

                    analysisView.interactive = true;
                    analysisView.selectedViewshed = programaticViewshed;

                    initializePreview(SView, programaticViewshed, analysisView);

                    function initializePreview(view, programaticViewshed, analysisView) {
                        var PHOTO2_WTLayer_ = new WebTileLayer({
                            urlTemplate: "https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/GoogleMapsCompatible/{level}/{row}/{col}", id: "layer_PHOTO2_", title: "測繪中心影像", visible: true
                        });

                        var sceneLayer_ = new SceneLayer({
                            url: "https://i3s.nlsc.gov.tw/building/i3s/SceneServer/layers/11",
                            id: "NLSC3dLayer_",
                            title: "三維建物模型",
                            outFields: [],
                            popupEnabled: false,
                            elevationInfo: { mode: "absolute-height", offset: 0.1, unit: "meters" },
                            opacity: 0.8,
                            minScale: 5000,
                            visible: true
                        });

                        let MainMap_ = new Map({
                            center: { type: "point", x: x, y: y, spatialReference: { wkid: 4326 } },
                            scale: 1250,
                            layers: [PHOTO2_WTLayer_, sceneLayer_] 
                        });
                        let previewView = new SceneView({
                            container: "previewView_Div",
                            map: MainMap_, scale: MainMap_.scale, center: MainMap_.center,
                            constraints: { snapToZoom: true, altitude: { min: 50, max: 5000000 } },
                        });
                        previewView.ui.components = [];

                        previewView.camera = getCameraFromViewshed(programaticViewshed);
                        previewView.environment = view.environment;

                        reactiveUtils.when(
                            () => {
                                const viewshed = analysisView.selectedViewshed;
                                return viewshed ? getCameraFromViewshed(viewshed) : null;
                            },
                            (camera) => { previewView.camera = camera; }
                        );
                    }

                    function getCameraFromViewshed(viewshed) {
                        return new Camera({
                            position: viewshed.observer,
                            heading: viewshed.heading,
                            tilt: viewshed.tilt,
                            fov: getDiagonal(viewshed.verticalFieldOfView, viewshed.horizontalFieldOfView)
                        });
                    }
                    function getDiagonal(a, b) {
                        return Math.sqrt(a ** 2 + b ** 2);
                    }

                })
            })
        }
    </script>
    <script>
        function WGStoW3857(X, Y) {
            var WGS = new Array();
            if (Math.abs(X) > 180 || Math.abs(Y) > 90) {

            } else {
                var num = X * 0.0174532925199433;
                var x = 6378137.0 * num;
                var a = Y * 0.0174532925199433;
                X = x;
                Y = 3189068.5 * Math.log((1.0 + Math.sin(a)) / (1.0 - Math.sin(a)));
                WGS[0] = X;
                WGS[1] = Y;
            }
            return WGS;
        }
    </script>
    <div id="mapDiv">
        <div id="SceneViewshed_Div"></div>
        <div id="previewContainer">
            <div id="previewView_Div" style="width:100%;height:100%;"></div>
        </div>
    </div>
</body>
</html>
