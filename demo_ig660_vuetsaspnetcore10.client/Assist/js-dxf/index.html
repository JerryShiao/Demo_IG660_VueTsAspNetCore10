<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>tokml</title>
    <meta http-equiv='content-type' content='text/html; charset=utf-8' />
    <meta name='viewport' content='initial-scale=1.0 maximum-scale=1.0'>
    <script src='dxf_bundle.js'></script>
    <script src='../../jsv01/TransCoord.js'></script>
</head>
<body>
    <h2>下載DXF</h2>
    <button id='convert-raw' onclick="trydxf();">檔案準備好了<br>~請按此下載</button>
    <hr />
    <p>提醒您，另存下來的DXF可以用GIS軟體打開再做利用</p>
    <script>
        function trydxf() {
            var layid = parent.layerexpto_Id;
            var visibleLayer = parent.MainMap.findLayerById(layid);

            if (visibleLayer.type == "graphics") {
                trydxf_items(visibleLayer.graphics.items)
            }
            else if (visibleLayer.type == "feature") {
                trydxf_items(visibleLayer.source.items)
            }

            function trydxf_items(items) {
                var Drawing = require('Drawing');

                var d = new Drawing();
                d.setUnits('Meters');
                d.addLayer('LAYER1', Drawing.ACI.GREEN, 'CONTINUOUS');
                d.setActiveLayer('LAYER1');

                //let pc = transformproj4(coor, '4326', val.position);
                items.forEach(function (fea, key) {
                    if (fea.geometry.type == 'point') {
                        if (fea.symbol) {
                            if (fea.symbol.type == 'text') {
                                d.drawText(fea.geometry.longitude, fea.geometry.latitude, fea.symbol.lineHeight, fea.symbol.angle, fea.symbol.text, fea.symbol.horizontalAlignment, fea.symbol.verticalAlignment);
                            }
                            else { d.drawPoint(fea.geometry.longitude, fea.geometry.latitude); }
                        }
                        else { d.drawPoint(fea.geometry.longitude, fea.geometry.latitude); }
                    }
                    else if (fea.geometry.type == 'polyline') {
                        fea.geometry.paths.forEach(function (path, key) {
                            path.forEach(function (val, key) {
                                let nextPoint = path[key + 1];
                                if (nextPoint) {
                                    if (val[0] > 180) {
                                        let point1 = W3875toWGS(val[0], val[1])
                                        let point2 = W3875toWGS(nextPoint[0], nextPoint[1])
                                        d.drawLine(point1[0], point1[1], point2[0], point2[1]);
                                    }
                                    else {
                                        d.drawLine(val[0], val[1], nextPoint[0], nextPoint[1]);
                                    }
                                }
                            })
                        })
                    }
                    else if (fea.geometry.type == 'polygon') {
                        fea.geometry.rings.forEach(function (ring, key) {
                            if (ring.length) {
                                let tempRing = []
                                ring.forEach(function (obj2, key) {
                                    if (obj2[0] > 180) { tempRing.push(W3875toWGS(obj2[0], obj2[1])) }
                                    else { tempRing.push(obj2) }
                                })
                                d.drawPolygon(tempRing);
                            }
                        })
                    }
                    else {

                    }
                })
                const dxfString = d.toDxfString();

                const blob = new Blob([dxfString], { type: 'application/dxf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = '下載dxf.dxf';
                link.click();
            }
        }
    </script>
</body>
</html>
