<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>公務圖資</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="demo/proj4.js"></script>
    <script src="lib/jszip.js"></script>
    <script src="lib/jszip-utils.js"></script>
    <script src="preprocess.js"></script>
    <script src="preview.js"></script>
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <link rel="stylesheet" href="https://unpkg.com/purecss@2.0.5/build/pure-min.css" integrity="sha384-LTIDeidl25h2dPxrB2Ekgc9c7sEC3CWGM6HeFmuDNUjX76Ert4Z4IY714dhZHPLd" crossorigin="anonymous">
</head>
<body>
    <form class="pure-form pure-form-aligned" style="margin: 10px">
        <fieldset>
            <div class="pure-control-group">
                <label for="landfun87_fileName" style="width:auto;display:inline-block">通用檔案：</label>
                <select name="landfun87_fileName" id="landfun87_fileName" style="width: 208px; display: inline-block"></select>
            </div>
        </fieldset>
    </form>
    <div class="layui-btn-container" style="text-align:center">
        <button type="button" class="layui-btn layui-btn-normal layui-btn-radius" id="landfun87_btn1">下載</button>
        <button type="button" class="layui-btn layui-btn-normal layui-btn-radius" id="landfun87_btn2">讀取</button>
    </div>
    <div class="layui-btn-container" style="text-align:center">
        <button type="button" class="layui-btn layui-btn-radius" id="landfun87_btn3">個人分享檔案區</button><br />
        <button type="button" class="layui-btn layui-btn-radius" id="landfun87_btn4">個人圖資儲存區</button>
    </div>
    <script>
        let select = document.getElementById('landfun87_fileName');
        select.innerHTML = "";
        $.each(['道路節點.zip', '道路中心線_含路寬路名.zip', '道路面.zip'], function (key, fileName) {
            let opt = document.createElement("option");
            opt.value = fileName;
            opt.innerText = fileName;
            select.appendChild(opt);
        })
        document.getElementById('landfun87_btn1').addEventListener("click", function () {
            let landfun87_fileName = $('#landfun87_fileName').val();
            let a = document.createElement('a');
            a.href = '../../landfun87/' + landfun87_fileName;
            a.target = '_blank'
            a.download = $('#landfun87_fileName').val();
            a.click();
            return false
        })
        document.getElementById('landfun87_btn2').addEventListener("click", function () {
            let landfun87_fileName = $('#landfun87_fileName').val();
            parent.qLoading();
            let epsg = 4326, encoding = 'big5'//'utf-8'
            loadshp({ url: '../../landfun87/' + landfun87_fileName, encoding: encoding, EPSG: epsg, RType: "Normal", url_name: landfun87_fileName }, function (SHPdata) {
            });
        })
        document.getElementById('landfun87_btn3').addEventListener("click", function () {
            parent.layer.closeAll();
            parent.layer.open({
                type: 2,
                area: ['98%', '98%'],
                content: './admu/RP_File.html',
                shade: 0.1,
                title: '上傳檔案'
            });
        })
        document.getElementById('landfun87_btn4').addEventListener("click", function () {
            parent.admUserLayer_Open();
        })
    </script>
</body>
</html>
